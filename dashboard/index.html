<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenMeta Contribution Dashboard</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f4f7fb;
  --surface: #ffffff;
  --surface-alt: #eef3f8;
  --surface-strong: #e3ebf5;
  --text: #102033;
  --muted: #5d6d82;
  --border: #d7e0ea;
  --shadow: 0 18px 40px rgba(16, 32, 51, 0.08);
  --blue: #2f6df6;
  --teal: #0d9b8a;
  --orange: #f18e2e;
  --red: #dc5f58;
  --slate: #7a8ea6;
  --green: #1f9b63;
  --radius: 8px;
  --max-width: 1380px;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: linear-gradient(180deg, #eef4fb 0%, var(--bg) 220px, #f8fafc 100%);
  color: var(--text);
}

.app-shell {
  width: min(var(--max-width), calc(100vw - 32px));
  margin: 24px auto 48px;
}

.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 18px;
  padding: 24px 28px;
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(215, 224, 234, 0.9);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.brand {
  display: grid;
  gap: 8px;
  min-width: 0;
}

.brand-line {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0) 40%),
    linear-gradient(135deg, #1c8eff, #0d9b8a 68%, #7bd789 100%);
  color: #ffffff;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
}

.eyebrow {
  margin: 0 0 6px;
  color: var(--blue);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 700;
  text-transform: uppercase;
}

.brand h1 {
  margin: 0;
  font-size: 28px;
  line-height: 1.05;
  font-weight: 700;
}

.topbar-meta {
  display: grid;
  grid-template-columns: repeat(3, minmax(120px, 1fr));
  gap: 12px;
  min-width: min(100%, 420px);
}

.topbar-meta-wide {
  grid-template-columns: repeat(4, minmax(120px, 1fr));
  min-width: min(100%, 560px);
}

.meta-block {
  padding: 12px 12px 10px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.meta-label {
  margin: 0 0 6px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
}

.meta-value {
  margin: 0;
  font-size: 15px;
  line-height: 1.3;
  font-weight: 600;
  color: var(--text);
}

.toolbar {
  display: grid;
  grid-template-columns: 1fr auto auto auto auto;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 10px 24px rgba(16, 32, 51, 0.05);
}

.toolbar-note {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 600;
}

.toolbar-controls {
  display: contents;
}

.sync-wrap {
  display: grid;
  gap: 6px;
  min-width: 172px;
}

.field {
  display: grid;
  gap: 6px;
  min-width: 0;
}

.field label,
.sync-wrap label {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
}

select,
button {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font: inherit;
}

select {
  min-width: 148px;
  padding: 10px 12px;
  font-size: 14px;
  line-height: 1.2;
  box-shadow: 0 4px 10px rgba(16, 32, 51, 0.03);
}

.sync-button {
  min-height: 42px;
  padding: 10px 14px;
  background: linear-gradient(180deg, #ffffff, #f7faff);
  box-shadow: 0 6px 14px rgba(16, 32, 51, 0.06);
  font-size: 13px;
  line-height: 1.2;
  font-weight: 650;
  cursor: pointer;
}

.sync-button:active {
  transform: translateY(1px);
}

.sync-status {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.35;
  min-height: 0;
}

.segment {
  display: inline-flex;
  padding: 4px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface-alt);
  gap: 4px;
}

.segment button {
  min-width: 72px;
  padding: 8px 12px;
  border-color: transparent;
  background: transparent;
  font-size: 13px;
  line-height: 1.2;
  font-weight: 600;
  cursor: pointer;
}

.segment button.active {
  background: var(--surface);
  box-shadow: 0 2px 6px rgba(16, 32, 51, 0.08);
  color: var(--blue);
}

.layout {
  display: grid;
  gap: 16px;
}

.decision-row {
  display: grid;
  grid-template-columns: 1.08fr 0.92fr;
  gap: 16px;
  align-items: start;
}

.panel-row {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 16px;
  align-items: start;
}

.panel-row-tight {
  grid-template-columns: 1fr;
}

.section,
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 10px 28px rgba(16, 32, 51, 0.05);
  overflow: hidden;
}

.section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}

.section-head h2 {
  margin: 0;
  font-size: 17px;
  line-height: 1.2;
  font-weight: 650;
}

.section-badge {
  white-space: nowrap;
  padding: 7px 10px;
  border-radius: var(--radius);
  background: var(--surface-alt);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 600;
}

.summary-shell,
.decision-wrap,
.chart-wrap,
.list-wrap,
.table-wrap,
.vault-wrap {
  padding: 14px 20px 18px;
}

.summary-shell {
  display: grid;
  gap: 18px;
}

.summary-primary {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.stat {
  padding: 20px 18px 18px;
  border-right: 1px solid var(--border);
  min-height: 138px;
  display: grid;
  gap: 16px;
  align-content: space-between;
  background: linear-gradient(180deg, #ffffff, #fbfdff);
}

.stat:last-child {
  border-right: 0;
}

.stat-label {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.25;
}

.stat-value {
  margin: 0;
  font-size: 34px;
  line-height: 0.98;
  font-weight: 700;
}

.stat-meta {
  display: grid;
  gap: 8px;
}

.stat-meta-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.stat-tag {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 3px 7px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface-alt);
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
  font-weight: 600;
}

.stat-foot {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}

.stat-accent {
  width: 30px;
  height: 6px;
  border-radius: 999px;
}

.funnel-panel {
  display: grid;
  gap: 18px;
  padding: 20px 18px 26px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: linear-gradient(180deg, #fbfdff, #f6faff);
}

.funnel-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}

.funnel-head h3 {
  margin: 0;
  font-size: 14px;
  line-height: 1.2;
  font-weight: 700;
}

.funnel-caption {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  white-space: nowrap;
}

.funnel-list {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.funnel-item {
  display: grid;
  gap: 8px;
}

.funnel-top {
  display: grid;
  gap: 4px;
}

.funnel-label {
  font-size: 12px;
  line-height: 1.2;
  font-weight: 650;
  color: var(--text);
}

.funnel-meta {
  color: var(--text);
  font-size: 18px;
  line-height: 1;
  font-weight: 700;
}

.funnel-meta span {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
  font-weight: 600;
}

.funnel-bar {
  height: 8px;
  border-radius: 999px;
  overflow: hidden;
  background: var(--surface-alt);
}

.funnel-bar span {
  display: block;
  height: 100%;
  border-radius: inherit;
}

.funnel-bar span[data-tone="slate"] {
  background: rgba(122, 142, 166, 0.95);
}

.funnel-bar span[data-tone="published"] {
  background: rgba(13, 155, 138, 0.86);
}

.funnel-bar span[data-tone="pr_open"] {
  background: rgba(47, 109, 246, 0.9);
}

.funnel-bar span[data-tone="merged"] {
  background: rgba(31, 155, 99, 0.96);
}

.decision-callout {
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.decision-title {
  margin: 0 0 6px;
  font-size: 15px;
  line-height: 1.3;
  font-weight: 700;
}

.decision-copy {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
}

.decision-list {
  display: grid;
  gap: 6px;
}

.decision-item {
  display: grid;
  gap: 6px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}

.decision-item:last-child {
  border-bottom: 0;
  padding-bottom: 0;
}

.decision-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.decision-repo {
  font-size: 13px;
  line-height: 1.2;
  font-weight: 700;
}

.decision-reason {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}

.decision-strength {
  display: flex;
  align-items: center;
  gap: 10px;
}

.decision-meter {
  flex: 1;
  height: 8px;
  border-radius: 999px;
  overflow: hidden;
  background: var(--surface-alt);
  display: flex;
}

.decision-meter span[data-kind="revisit"] {
  background: rgba(122, 142, 166, 0.95);
}

.decision-meter span[data-kind="landing"] {
  background: rgba(31, 155, 99, 0.95);
}

.decision-meter span[data-kind="memory"] {
  background: rgba(47, 109, 246, 0.95);
}

.decision-strength-meta {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
  white-space: nowrap;
}

.trend-insight {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.trend-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 12px;
}

.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
}

.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
}

.legend-dot.drafted {
  background: var(--blue);
}

.legend-dot.published {
  background: var(--teal);
}

.legend-dot.pr_open {
  background: var(--blue);
}

.legend-dot.merged {
  background: var(--orange);
}

.trend-summary {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 14px;
}

.trend-summary-item {
  display: grid;
  gap: 4px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: linear-gradient(180deg, #fbfdff, #f6faff);
}

.trend-summary-label {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
  font-weight: 600;
}

.trend-summary-value {
  color: var(--text);
  font-size: 22px;
  line-height: 1;
  font-weight: 700;
}

.trend-summary-note {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
}

.trend-chart {
  display: grid;
  grid-template-columns: 38px minmax(0, 1fr);
  gap: 12px;
  align-items: stretch;
}

.trend-y-axis {
  display: grid;
  grid-template-rows: repeat(5, 1fr);
  min-height: 236px;
  padding-bottom: 26px;
}

.trend-y-tick {
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  color: var(--muted);
  font-size: 11px;
  line-height: 1;
  transform: translateY(6px);
}

.trend-plot {
  position: relative;
  min-height: 236px;
  padding: 10px 0 0 10px;
  border-left: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background-image:
    linear-gradient(to top, rgba(215, 224, 234, 0.74) 1px, transparent 1px),
    linear-gradient(to top, rgba(215, 224, 234, 0.74) 1px, transparent 1px),
    linear-gradient(to top, rgba(215, 224, 234, 0.74) 1px, transparent 1px),
    linear-gradient(to top, rgba(215, 224, 234, 0.74) 1px, transparent 1px);
  background-size: 100% 25%;
  background-position: left bottom;
  background-repeat: no-repeat;
}

.trend-bars {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(48px, 1fr));
  gap: 10px;
  align-items: end;
  min-height: 208px;
}

.trend-col {
  display: grid;
  gap: 8px;
  align-items: end;
  min-height: 208px;
}

.trend-stack {
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  justify-content: flex-start;
  padding-top: 8px;
  gap: 0;
  min-height: 182px;
}

.trend-bar {
  width: 20px;
  border-radius: 0;
  min-height: 8px;
}

.trend-bar[data-kind="drafted"] {
  background: rgba(47, 109, 246, 0.24);
  border-radius: 3px 3px 0 0;
}

.trend-bar[data-kind="published"] {
  background: rgba(13, 155, 138, 0.58);
}

.trend-bar[data-kind="pr_open"] {
  background: rgba(47, 109, 246, 0.9);
}

.trend-bar[data-kind="merged"] {
  background: rgba(241, 142, 46, 0.96);
}

.trend-meta {
  display: grid;
  gap: 3px;
  text-align: center;
}

.trend-period {
  font-size: 12px;
  line-height: 1.2;
  font-weight: 600;
  color: var(--text);
}

.trend-total {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
}

.trend-source {
  color: var(--muted);
  font-size: 10px;
  line-height: 1.2;
}

.table-tools {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

thead th {
  text-align: left;
  padding: 10px 10px 12px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}

tbody td {
  padding: 12px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  font-size: 13px;
  line-height: 1.4;
}

tbody tr:last-child td {
  border-bottom: 0;
}

.project-cell,
.activity-cell,
.archive-cell {
  display: grid;
  gap: 4px;
  min-width: 0;
}

.attempt-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.trace-cell {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.trace-tag {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 3px 7px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: linear-gradient(180deg, #ffffff, #f5f9fe);
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
  font-weight: 600;
}

.repo-title,
.activity-title,
.archive-title {
  font-weight: 650;
  color: var(--text);
}

.repo-sub,
.activity-sub,
.archive-sub {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}

.repo-sub + .repo-sub {
  margin-top: -1px;
}

.source-mix-compact {
  display: grid;
  gap: 4px;
  margin-top: 1px;
}

.source-mix-bar {
  width: min(148px, 100%);
  height: 6px;
  display: flex;
  overflow: hidden;
  border-radius: 999px;
  background: var(--surface-alt);
}

.source-mix-bar span[data-source="proof"] {
  background: rgba(31, 155, 99, 0.92);
}

.source-mix-bar span[data-source="memory"] {
  background: rgba(13, 155, 138, 0.88);
}

.source-mix-bar span[data-source="inbox"] {
  background: rgba(47, 109, 246, 0.9);
}

.source-mix-bar span[data-source="artifact"] {
  background: rgba(122, 142, 166, 0.9);
}

.source-mix-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
}

.pill {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 3px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface-alt);
  font-size: 11px;
  line-height: 1.2;
  font-weight: 700;
}

.pill[data-tone="deepen"] {
  background: rgba(31, 155, 99, 0.12);
  border-color: rgba(31, 155, 99, 0.2);
  color: #0f7a4a;
}

.pill[data-tone="watch"] {
  background: rgba(47, 109, 246, 0.1);
  border-color: rgba(47, 109, 246, 0.16);
  color: #2c5fce;
}

.pill[data-tone="pause"] {
  background: rgba(241, 142, 46, 0.12);
  border-color: rgba(241, 142, 46, 0.18);
  color: #c26d0d;
}

.pill[data-tone="merged"] {
  background: rgba(31, 155, 99, 0.12);
  border-color: rgba(31, 155, 99, 0.2);
  color: #0f7a4a;
}

.pill[data-tone="pr_open"] {
  background: rgba(47, 109, 246, 0.1);
  border-color: rgba(47, 109, 246, 0.16);
  color: #2c5fce;
}

.pill[data-tone="published"] {
  background: rgba(13, 155, 138, 0.1);
  border-color: rgba(13, 155, 138, 0.16);
  color: #0e7f72;
}

.pill[data-tone="draft_only"] {
  background: rgba(241, 142, 46, 0.12);
  border-color: rgba(241, 142, 46, 0.18);
  color: #c26d0d;
}

.pill[data-tone="stalled"] {
  background: rgba(220, 95, 88, 0.12);
  border-color: rgba(220, 95, 88, 0.18);
  color: #b24d47;
}

.source-pill {
  flex-shrink: 0;
}

.source-pill[data-source="proof"] {
  background: rgba(31, 155, 99, 0.12);
  border-color: rgba(31, 155, 99, 0.18);
  color: #0f7a4a;
}

.source-pill[data-source="memory"] {
  background: rgba(13, 155, 138, 0.1);
  border-color: rgba(13, 155, 138, 0.16);
  color: #0e7f72;
}

.source-pill[data-source="inbox"] {
  background: rgba(47, 109, 246, 0.1);
  border-color: rgba(47, 109, 246, 0.16);
  color: #2c5fce;
}

.source-pill[data-source="artifact"] {
  background: rgba(122, 142, 166, 0.12);
  border-color: rgba(122, 142, 166, 0.18);
  color: #5f7189;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  display: inline-block;
  margin-right: 6px;
}

.status-dot[data-tone="deepen"] {
  background: #1f9b63;
}

.status-dot[data-tone="watch"] {
  background: #2f6df6;
}

.status-dot[data-tone="pause"] {
  background: #f18e2e;
}

.sparkline {
  width: 90px;
  height: 22px;
}

.link-button {
  width: 28px;
  height: 28px;
  display: inline-grid;
  place-items: center;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface-alt);
  color: var(--muted);
  text-decoration: none;
  transition: background-color 120ms ease, color 120ms ease, border-color 120ms ease;
}

.link-button-inline {
  width: auto;
  min-width: 28px;
  height: 28px;
  padding: 0 8px 0 10px;
  grid-auto-flow: column;
  gap: 6px;
  justify-content: center;
  font-size: 11px;
  line-height: 1.2;
  font-weight: 700;
  white-space: nowrap;
}

.link-button-inline span {
  display: inline-block;
}

.link-button-disabled {
  color: var(--slate);
  background: linear-gradient(180deg, #fbfdff, #f2f6fb);
  border-color: rgba(122, 142, 166, 0.2);
  cursor: default;
}

.link-button:hover {
  background: rgba(47, 109, 246, 0.08);
  border-color: rgba(47, 109, 246, 0.22);
  color: var(--blue);
}

.link-button-disabled:hover {
  background: linear-gradient(180deg, #fbfdff, #f2f6fb);
  border-color: rgba(122, 142, 166, 0.2);
  color: var(--slate);
}

.activity-list {
  display: grid;
  gap: 0;
}

.activity-item {
  display: grid;
  gap: 8px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

.archive-evidence {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
  font-weight: 600;
}

.activity-item:last-child {
  border-bottom: 0;
  padding-bottom: 0;
}

.activity-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.activity-meta {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
}

.vault-meta {
  display: flex;
  align-items: center;
  gap: 10px;
}

.vault-composition {
  width: 120px;
  height: 8px;
  border-radius: 999px;
  overflow: hidden;
  background: var(--surface-alt);
  display: flex;
}

.vault-composition span[data-kind="dossiers"] {
  background: rgba(47, 109, 246, 0.95);
}

.vault-composition span[data-kind="patchDrafts"] {
  background: rgba(13, 155, 138, 0.85);
}

.vault-composition span[data-kind="prDrafts"] {
  background: rgba(241, 142, 46, 0.92);
}

.vault-composition span[data-kind="memoryFiles"] {
  background: rgba(122, 142, 166, 0.95);
}

.archive-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.archive-column {
  display: grid;
  gap: 12px;
}

.archive-column-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.archive-column-head h3 {
  margin: 0;
  font-size: 14px;
  line-height: 1.3;
  font-weight: 700;
}

.archive-item {
  display: grid;
  gap: 8px;
  padding: 12px 0;
  border-top: 1px solid var(--border);
}

.archive-item:first-of-type {
  border-top: 0;
  padding-top: 0;
}

.archive-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.archive-lines {
  display: grid;
  gap: 4px;
}

.archive-line {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}

.archive-line-strong {
  color: var(--text);
  font-weight: 600;
}

@media (max-width: 1200px) {
  .decision-row,
  .panel-row,
  .summary-primary,
  .archive-grid,
  .funnel-list {
    grid-template-columns: 1fr;
  }

  .trend-head,
  .trend-summary {
    grid-template-columns: 1fr;
  }

  .stat {
    border-right: 0;
    border-bottom: 1px solid var(--border);

  .stat:last-child {
    border-bottom: 0;
  }
}

@media (max-width: 960px) {
  .topbar,
  .toolbar {
    display: grid;
    grid-template-columns: 1fr;
  }

  .topbar-meta {
    grid-template-columns: repeat(2, minmax(0, 1fr));

  }

  .section-head {

  .section-badge {

  .topbar {
    gap: 14px;
    padding: 16px;
  }

  .toolbar {
    padding: 12px;
  }

  .topbar-meta {
    grid-template-columns: repeat(3, minmax(0, 1fr));

  .meta-block {

  .toolbar-controls {

  .toolbar-controls > .field:nth-child(3),

  .summary-primary {

  .trend-bars {

  .trend-head {

  .trend-summary {

  .trend-chart {

    gap: 8px;

  .trend-plot {

  table,
  thead,

  th,

  tbody td {

  tbody td::before {

  .meta-label,

  select {

  }

  .sync-wrap {
    gap: 4px;
    min-width: 0;
  }
}
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-line">
          <div class="brand-mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M3 12.2V5.8L9 2.6L15 5.8V12.2L9 15.4L3 12.2Z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M6.2 10.2L8.2 12.2L12 7.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <p class="eyebrow">Contribution Ledger</p>
            <h1>OpenMeta Contribution Dashboard</h1>
          </div>
        </div>
      </div>
      <div class="topbar-meta topbar-meta-wide" id="topbar-meta"></div>
    </header>

    <section class="toolbar">
      <div class="toolbar-note" id="toolbar-note"></div>
      <div class="toolbar-controls">
        <div class="field">
          <label for="repo-filter">Repository</label>
          <select id="repo-filter"></select>
        </div>
        <div class="field">
          <label for="decision-filter">Decision</label>
          <select id="decision-filter"></select>
        </div>
        <div class="field">
          <label>Period</label>
          <div class="segment" id="period-segment" aria-label="Period switch">
            <button type="button" data-period="weekly" class="active">Weekly</button>
            <button type="button" data-period="monthly">Monthly</button>
          </div>
        </div>
        <div class="sync-wrap">
          <label for="refresh-button">Snapshot</label>
          <button type="button" class="sync-button" id="refresh-button">Refresh Snapshot</button>
          <div class="sync-status" id="sync-status"></div>
        </div>
      </div>
    </section>

    <main class="layout">
      <div class="decision-row">
        <section class="section">
          <div class="section-head">
            <div>
              <h2>Overview</h2>
            </div>
            <div class="section-badge" id="overview-badge"></div>
          </div>
          <div class="summary-shell">
            <div class="summary-primary" id="overview-primary"></div>
            <div class="funnel-panel" id="overview-funnel"></div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <h2>Deepen Decision</h2>
            </div>
            <div class="section-badge" id="focus-badge"></div>
          </div>
          <div class="decision-wrap">
            <div class="decision-callout" id="decision-callout"></div>
            <div class="decision-list" id="decision-list"></div>
          </div>
        </section>
      </div>

      <section class="section">
        <div class="section-head">
          <div>
            <h2>Projects</h2>
          </div>
          <div class="section-badge" id="projects-badge"></div>
        </div>
        <div class="table-wrap">
          <div class="table-tools">
            <div id="projects-summary"></div>
            <div id="projects-detail"></div>
          </div>
          <table>
            <thead>
              <tr>
                <th style="width: 30%;">Project</th>
                <th style="width: 12%;">State</th>
                <th style="width: 22%;">Contribution</th>
                <th style="width: 28%;">Latest Outcome</th>
                <th style="width: 8%;">Score</th>
              </tr>
            </thead>
            <tbody id="projects-table"></tbody>
          </table>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <h2>Contribution Attempts</h2>
          </div>
          <div class="section-badge" id="attempts-badge"></div>
        </div>
        <div class="table-wrap">
          <div class="table-tools">
            <div id="attempts-summary"></div>
            <div id="attempts-detail"></div>
          </div>
          <table>
            <thead>
              <tr>
                <th style="width: 46%;">Attempt</th>
                <th style="width: 14%;">Outcome</th>
                <th style="width: 18%;">Ledger Trace</th>
                <th style="width: 14%;">Last Update</th>
                <th style="width: 8%;">Open</th>
              </tr>
            </thead>
            <tbody id="attempts-table"></tbody>
          </table>
        </div>
      </section>

      <div class="panel-row">
        <section class="panel">
          <div class="section-head">
            <div>
              <h2>Momentum</h2>
            </div>
            <div class="section-badge" id="trend-badge"></div>
          </div>
          <div class="chart-wrap">
            <div class="trend-head">
              <div class="trend-insight" id="trend-insight"></div>
              <div class="legend">
                <div class="legend-item"><span class="legend-dot drafted"></span>Drafted</div>
                <div class="legend-item"><span class="legend-dot published"></span>Ledger Published</div>
                <div class="legend-item"><span class="legend-dot pr_open"></span>PR Open</div>
                <div class="legend-item"><span class="legend-dot merged"></span>Merged</div>
              </div>
            </div>
            <div class="trend-summary" id="trend-summary">
            </div>
            <div class="trend-chart">
              <div class="trend-y-axis" id="trend-y-axis"></div>
              <div class="trend-plot">
                <div class="trend-bars" id="trend-bars"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <h2>Recent Activity</h2>
            </div>
            <div class="section-badge" id="activity-badge"></div>
          </div>
          <div class="list-wrap">
            <div class="activity-list" id="activity-list"></div>
          </div>
        </section>
      </div>

      <div class="panel-row panel-row-tight">
        <section class="section">
          <div class="section-head">
            <div>
              <h2>Archive Snapshot</h2>
            </div>
            <div class="vault-meta">
              <div class="section-badge" id="archive-badge"></div>
              <div class="vault-composition" id="vault-composition"></div>
            </div>
          </div>
          <div class="vault-wrap">
            <div class="archive-grid" id="archive-grid"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
(function () {
  const state = {
    repo: "all",
    decision: "all",
    period: "weekly",
    syncPending: false,
    filtersInitialized: false,
  };

  let data = null;

  const decisionLabelMap = {
    all: "All decisions",
    deepen: "Deepen",
    watch: "Watch",
    pause: "Pause",
  };

  const outcomeLabelMap = {
    merged: "Merged",
    pr_open: "PR Open",
    published: "Ledger Published",
    draft_only: "Draft Only",
    stalled: "Stalled",
  };

  const archiveToneMap = {
    ready: "published",
    review: "stalled",
    hold: "draft_only",
    compounding: "pr_open",
  };

  function formatRepoLabel(repo) {
    return repo === "all" ? "All repositories" : repo;
  }

  function formatDecisionLabel(decision) {
    return decisionLabelMap[decision] || decision;
  }

  function formatOutcomeLabel(outcome) {
    return outcomeLabelMap[outcome] || outcome;
  }

  function formatWorkType(workType) {
    const map = {
      code: "code-heavy",
      tests: "test-heavy",
      docs: "docs-heavy",
      infra: "infra-heavy",
      planning: "planning-heavy",
      mixed: "mixed",
      unknown: "unknown",
    };
    return map[workType] || workType || "unknown";
  }

  function formatValidationLabel(stateValue, summary) {
    if (stateValue === "passed") {
      return `validation passed${summary ? ` | ${summary}` : ""}`;
    }
    if (stateValue === "failed") {
      return `validation failed${summary ? ` | ${summary}` : ""}`;
    }
    if (stateValue === "reported") {
      return summary || "validation reported";
    }
    return "validation not run";
  }

  function formatAttemptReference(item) {
    const parts = [item.reference || `${item.repoFullName}#${item.issueNumber}`];
    if (item.pullRequestNumber) {
      parts.push(`PR #${item.pullRequestNumber}`);
    }
    if (item.branchName) {
      parts.push(item.branchName);
    }
    return parts.join(" | ");
  }

  function formatAttemptWorkSummary(item) {
    const pieces = [];

    if (item.workType) {
      pieces.push(formatWorkType(item.workType));
    }

    if (item.changedFilesCount > 0) {
      const preview = (item.changedFilePreview || []).join(", ");
      pieces.push(`${item.changedFilesCount} files${preview ? ` | ${preview}` : ""}`);
    } else if ((item.fileAreaHints || []).length > 0) {
      pieces.push(`areas ${item.fileAreaHints.join(", ")}`);
    } else {
      pieces.push("no changed files recorded");
    }

    pieces.push(item.blockedLabel || "local draft only");
    if (item.isReopenable) {
      pieces.push(`reopen | ${item.reopenHint}`);
    } else if (item.reopenHint) {
      pieces.push(item.reopenHint);
    }
    if ((item.staleDays ?? 0) > 0) {
      pieces.push(`${item.staleDays}d old`);
    }
    return pieces.join(" | ");
  }

  function getProjectSignals(repoFullName) {
    const projectSignals = data.projectSignals || {};
    return projectSignals[repoFullName] || { revisit: 40, landing: 40, memory: 40, trend: [0, 0, 0, 0] };
  }

  function filteredProjects() {
    return data.projects.filter((item) => {
      const repoMatch = state.repo === "all" || item.repoFullName === state.repo;
      const decisionMatch = state.decision === "all" || item.decision === state.decision;
      return repoMatch && decisionMatch;
    });
  }

  function filteredActivity() {
    const visibleRepos = new Set(filteredProjects().map((item) => item.repoFullName));
    return data.activity.filter((item) => {
      if (state.repo !== "all" && item.repoFullName !== state.repo) {
        return false;
      }
      if (state.decision === "all") {
        return true;
      }
      return visibleRepos.has(item.repoFullName);
    });
  }

  function filteredAttempts() {
    return data.attempts.filter((item) => {
      const repoMatch = state.repo === "all" || item.repoFullName === state.repo;
      const decisionMatch = state.decision === "all" || item.decision === state.decision;
      return repoMatch && decisionMatch;
    });
  }

  function decisionItems() {
    return [
      ...data.focus.deepen.map((item) => ({ ...item, decision: "deepen" })),
      ...data.focus.watch.map((item) => ({ ...item, decision: "watch" })),
      ...data.focus.pause.map((item) => ({ ...item, decision: "pause" })),
    ].filter((item) => {
      const repoMatch = state.repo === "all" || item.repoFullName === state.repo;
      const decisionMatch = state.decision === "all" || item.decision === state.decision;
      return repoMatch && decisionMatch;
    });
  }

  function shortlistDecisionItems() {
    return decisionItems().slice(0, 4);
  }

  function trendRecords() {
    return data.trends[state.period] || [];
  }

  function buildTrendInsight(records) {
    if (records.length === 0) {
      return "Insight: No contribution rhythm has been recorded yet.";
    }

    const latest = records[records.length - 1];
    const previous = records[records.length - 2] || latest;
    const draftedDelta = latest.drafted - previous.drafted;
    const publishedDelta = (latest.ledgerPublished ?? latest.published ?? 0) - (previous.ledgerPublished ?? previous.published ?? 0);
    const prOpenDelta = (latest.prOpen ?? 0) - (previous.prOpen ?? 0);
    const mergedDelta = latest.merged - previous.merged;

    if (latest.drafted === 0 && (latest.ledgerPublished ?? latest.published ?? 0) === 0 && latest.merged === 0) {
      return "Insight: The current window is empty, so the dashboard is waiting for the first real contribution trail.";
    }

    if (draftedDelta > publishedDelta && publishedDelta <= 0) {
      return "Insight: Draft volume is present, but ledger landing is flattening.";
    }

    if (prOpenDelta > 0 && publishedDelta > 0) {
      return "Insight: Ledger publication and upstream PR creation are still moving together.";
    }

    if (mergedDelta <= 0 && publishedDelta > 0) {
      return "Insight: Ledger publication is stable, but final upstream landing is still thinner.";
    }

    return "Insight: Contribution momentum is steady, with no major break in the landing path.";
  }

  function buildTrendSummary(records) {
    if (records.length === 0) {
      return [
        { label: "Latest Drafted", value: 0, note: "n/a" },
        { label: "Ledger Rate", value: "0%", note: "0/0" },
        { label: "PR Rate", value: "0%", note: "0/0" },
      ];
    }

    const latest = records[records.length - 1];
    const drafted = latest.drafted;
    const published = latest.ledgerPublished ?? latest.published ?? 0;
    const prOpen = latest.prOpen ?? 0;
    const merged = latest.merged;
    const publishRate = drafted > 0 ? Math.round((published / drafted) * 100) : 0;
    const prRate = drafted > 0 ? Math.round((prOpen / drafted) * 100) : 0;

    return [
      { label: "Latest Drafted", value: drafted, note: latest.period },
      { label: "Ledger Rate", value: `${publishRate}%`, note: `${published}/${drafted}` },
      { label: "PR Rate", value: `${prRate}%`, note: `${prOpen}/${drafted}` },
    ];
  }

  function ensureCurrentFiltersStillValid() {
    if (!data.filters.availableRepos.includes(state.repo)) {
      state.repo = "all";
    }
    if (!data.filters.availableDecisions.includes(state.decision)) {
      state.decision = "all";
    }
  }

  function populateSelect(select, values, formatter, currentValue) {
    select.innerHTML = "";
    values.forEach((value) => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = formatter(value);
      option.selected = value === currentValue;
      select.appendChild(option);
    });
  }

  function initFilters() {
    const repoSelect = document.getElementById("repo-filter");
    const decisionSelect = document.getElementById("decision-filter");
    const refreshButton = document.getElementById("refresh-button");

    ensureCurrentFiltersStillValid();
    populateSelect(repoSelect, data.filters.availableRepos, formatRepoLabel, state.repo);
    populateSelect(decisionSelect, data.filters.availableDecisions, formatDecisionLabel, state.decision);

    if (!state.filtersInitialized) {
      repoSelect.addEventListener("change", (event) => {
        state.repo = event.target.value;
        renderDashboard();
      });

      decisionSelect.addEventListener("change", (event) => {
        state.decision = event.target.value;
        renderDashboard();
      });

      document.getElementById("period-segment").querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          state.period = button.dataset.period;
          document
            .querySelectorAll("#period-segment button")
            .forEach((item) => item.classList.toggle("active", item === button));
          renderTrend();
        });
      });

      refreshButton.addEventListener("click", async () => {
        if (state.syncPending) {
          return;
        }

        state.syncPending = true;
        refreshButton.textContent = "Refreshing...";
        document.getElementById("sync-status").textContent = "Refreshing latest local snapshot...";

        try {
          await loadDashboardData({ forceRefresh: true });
          renderDashboard();
        } catch (error) {
          document.getElementById("sync-status").textContent =
            `Refresh failed | ${error instanceof Error ? error.message : String(error)}`;
        } finally {
          state.syncPending = false;
          refreshButton.textContent = data?.meta?.refreshLabel || "Refresh Snapshot";
        }
      });

      state.filtersInitialized = true;
    }

    refreshButton.textContent = data.meta.refreshLabel || "Refresh Snapshot";
  }

  function renderTopMeta() {
    const container = document.getElementById("topbar-meta");
    container.innerHTML = "";

    data.topMeta.forEach((item) => {
      const block = document.createElement("div");
      block.className = "meta-block";
      block.innerHTML = `
        <p class="meta-label">${item.label}</p>
        <p class="meta-value">${item.value}</p>
      `;
      container.appendChild(block);
    });

    document.getElementById("toolbar-note").textContent = data.meta.windowLabel;
    document.getElementById("overview-badge").textContent = data.summary.callout;
    document.getElementById("focus-badge").textContent =
      `${data.focus.deepen.length} deepen | ${data.focus.watch.length} watch | ${data.focus.pause.length} pause`;

          `${data.summary.sourceBreakdown.proof} proof-backed`,

        label: "Real PRs",

          `${data.summary.ledgerPublishedRuns} ledger publications`,

        <div class="stat-meta">

          </div>
          <div class="stat-foot">
            <span>${item.foot}</span>
            <span class="stat-accent" style="background:${item.accent};"></span>
          </div>
        </div>
      `;
      container.appendChild(block);

  function renderOverviewFunnel() {
    const totalAttempts = data.projects.reduce((sum, item) => sum + item.contributionCount, 0);
    const published = data.projects.reduce((sum, item) => sum + (item.ledgerPublishedCount ?? item.publishedCount ?? 0), 0);
    const prOpen = data.summary.realPrRuns;
    const merged = data.projects.reduce((sum, item) => sum + item.mergedCount, 0);
    const stages = [
      { label: "Attempts", value: totalAttempts, tone: "slate" },
      { label: "Ledger Published", value: published, tone: "published" },
      { label: "PR Open", value: prOpen, tone: "pr_open" },
      { label: "Merged", value: merged, tone: "merged" },
    ];
    const max = Math.max(...stages.map((item) => item.value), 1);
    const container = document.getElementById("overview-funnel");

    container.innerHTML = `
      <div class="funnel-head">
        <h3>Outcome Funnel</h3>
        <div class="funnel-caption">${published}/${totalAttempts} ledger published | ${merged}/${prOpen || 0} merged</div>
      </div>
      <div class="funnel-list">
        ${stages
          .map((item, index) => {
            const previous = index === 0 ? item.value : stages[index - 1].value;
            const ratio = previous > 0 ? Math.round((item.value / previous) * 100) : 0;
            return `
              <div class="funnel-item">
                <div class="funnel-top">
                  <div class="funnel-label">${item.label}</div>
                  <div class="funnel-meta">${item.value} <span>${index === 0 ? "base" : `${ratio}% from prev`}</span></div>
                </div>
                <div class="funnel-bar">
                  <span data-tone="${item.tone}" style="width:${(item.value / max) * 100}%;"></span>
                </div>
              </div>
            `;
          })
          .join("")}
      </div>
    `;
  }

  function renderDecisionCallout() {
    const items = shortlistDecisionItems();
    const fallback = data.projects[0];
    const top = items[0] || (fallback ? {
      repoFullName: fallback.repoFullName,
      summary: fallback.note,
      reasons: [],
      decision: fallback.decision,
    } : null);
    const container = document.getElementById("decision-callout");

    if (!top) {
      container.innerHTML = `
        <p class="decision-title">Recommendation: wait for the first real contribution trail</p>
        <p class="decision-copy">Once OpenMeta writes proof-of-work, memory, or artifact state, deepen recommendations will appear here.</p>
      `;
      return;
    }

    const signals = getProjectSignals(top.repoFullName);
    const recommendationLead =
      top.decision === "deepen"
        ? `Recommendation: shift contribution focus toward ${top.repoFullName}`
        : top.decision === "watch"
          ? `Recommendation: keep ${top.repoFullName} warm and look for one cleaner landing`
          : `Recommendation: keep ${top.repoFullName} archived, but do not deepen yet`;
    container.innerHTML = `
      <p class="decision-title">${recommendationLead}</p>
      <p class="decision-copy">${top.summary}</p>
      <div class="decision-strength">
        <div class="decision-meter">
          <span data-kind="revisit" style="width:${signals.revisit}%;"></span>
          <span data-kind="landing" style="width:${signals.landing}%;"></span>
          <span data-kind="memory" style="width:${signals.memory}%;"></span>
        </div>
        <span class="decision-strength-meta">R ${signals.revisit} | L ${signals.landing} | M ${signals.memory}</span>
      </div>
    `;
  }

  function renderDecisionList() {
    const groups = shortlistDecisionItems();
    const container = document.getElementById("decision-list");
    container.innerHTML = "";

    if (groups.length === 0) {
      const row = document.createElement("article");
      row.className = "decision-item";
      row.innerHTML = `
        <div class="decision-top">
          <div class="decision-repo">No recommendation lanes yet</div>
        </div>
        <div class="decision-reason">Generate real contribution records to let the dashboard rank deepen, watch, and pause lanes.</div>
      `;
      container.appendChild(row);
      return;
    }

    groups.forEach((item) => {
      const signals = getProjectSignals(item.repoFullName);
      const row = document.createElement("article");
      row.className = "decision-item";
      row.innerHTML = `
        <div class="decision-top">
          <div class="decision-repo">${item.repoFullName}</div>
          <span class="pill" data-tone="${item.decision}">${formatDecisionLabel(item.decision)}</span>
        </div>
        <div class="decision-reason">${(item.reasons || []).slice(0, 1).join("")}</div>
        <div class="decision-strength">
          <div class="decision-meter">
            <span data-kind="revisit" style="width:${signals.revisit}%;"></span>
            <span data-kind="landing" style="width:${signals.landing}%;"></span>
            <span data-kind="memory" style="width:${signals.memory}%;"></span>
          </div>
          <span class="decision-strength-meta">R ${signals.revisit} | L ${signals.landing} | M ${signals.memory}</span>
        </div>
      `;
      container.appendChild(row);
    });
  }

  function renderSparkline(values) {
    const pointsSource = Array.isArray(values) && values.length > 0 ? values : [0, 0, 0, 0];
    const max = Math.max(...pointsSource, 1);
    const width = 90;
    const height = 22;
    const step = pointsSource.length > 1 ? width / (pointsSource.length - 1) : width;
    const points = pointsSource
      .map((value, index) => {
        const x = index * step;
        const y = height - (value / max) * (height - 4) - 2;
        return `${x},${y}`;
      })
      .join(" ");

    return `
      <svg class="sparkline" viewBox="0 0 ${width} ${height}" aria-hidden="true">
        <polyline points="${points}" fill="none" stroke="#2f6df6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline>
      </svg>
    `;
  }

  function renderSourceMix(sourceMix) {
    const segments = [
      { key: "proof", short: "P", value: sourceMix.proof || 0 },
      { key: "memory", short: "M", value: sourceMix.memory || 0 },
      { key: "inbox", short: "I", value: sourceMix.inbox || 0 },
      { key: "artifact", short: "A", value: sourceMix.artifact || 0 },
    ];
    const total = segments.reduce((sum, item) => sum + item.value, 0);

    return `
      <div class="source-mix-compact" aria-label="Attempt source mix">
        <div class="source-mix-bar" aria-hidden="true">
          ${segments
            .map((item) => {
              const width = total > 0 ? (item.value / total) * 100 : 0;
              return `<span data-source="${item.key}" style="width:${width}%;"></span>`;
            })
            .join("")}
        </div>
        <div class="source-mix-meta">
          ${segments.map((item) => `<span>${item.short} ${item.value}</span>`).join("")}
        </div>
      </div>
    `;
  }

  function formatOpenTargetAction(openTarget) {
    const label = openTarget?.label || "Open";
    if (label === "Open") {
      return "Open Trail";
    }
    return `Open ${label}`;
  }

  function renderOpenAction(url, label) {
    if (!url) {
      return `
        <span class="link-button link-button-inline link-button-disabled" aria-disabled="true" title="No linked trail yet">
          <span>No Trail</span>
        </span>
      `;
    }

    return `
      <a class="link-button link-button-inline" href="${url}" target="_blank" rel="noreferrer" aria-label="${label}" title="${label}">
        <span>${label}</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M5.25 2H12V8.75" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 2L2 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M10.25 7.5V11.25C10.25 11.6642 9.91421 12 9.5 12H2.75C2.33579 12 2 11.6642 2 11.25V4.5C2 4.08579 2.33579 3.75 2.75 3.75H6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    `;
  }

  function renderProjectsTable() {
    const rows = filteredProjects();
    const table = document.getElementById("projects-table");

    table.innerHTML = "";
    document.getElementById("projects-summary").textContent =
      `${rows.length} projects | ${formatRepoLabel(state.repo)} | ${formatDecisionLabel(state.decision)}`;
    document.getElementById("projects-detail").textContent =
      `${rows.reduce((sum, item) => sum + item.contributionCount, 0)} attempts | ${rows.reduce(
        (sum, item) => sum + (item.ledgerPublishedCount ?? item.publishedCount ?? 0),
        0,
      )} ledger published | ${rows.reduce((sum, item) => sum + (item.reopenableAttemptCount ?? 0), 0)} reopenable`;

    if (rows.length === 0) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="5">No projects match the current filter state.</td>`;
      table.appendChild(tr);
      return;
    }

    rows.forEach((item) => {
      const signals = getProjectSignals(item.repoFullName);
      const latestOutcome = `${formatOutcomeLabel(item.lastOutcome)} (${item.lastActiveAt})`;
      const sourceMix = item.sourceMix || { proof: 0, memory: 0, inbox: 0, artifact: 0 };
      const projectActionLabel = "Open Trail";
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td data-label="Project">
          <div class="project-cell">
            <div class="repo-title">${item.repoFullName}</div>
            <div class="repo-sub">${item.representativeTitle || item.repoFullName}</div>
            <div class="repo-sub">${item.note}</div>
            <div class="repo-sub">${formatWorkType(item.dominantWorkType)} | ${(item.topAreas || []).join(", ") || "no area hints yet"}</div>
            <div class="repo-sub">${item.returnSessions ?? 0} return sessions | ${item.consecutiveActiveWindows ?? 0} consecutive windows | span ${item.activeWindowSpanDays ?? 0}d</div>
            ${renderSourceMix(sourceMix)}
          </div>
        </td>
        <td data-label="State">
          <span class="status-dot" data-tone="${item.decision}"></span>
          <span class="pill" data-tone="${item.decision}">${formatDecisionLabel(item.decision)}</span>
        </td>
        <td data-label="Contribution">
          <div class="project-cell">
            <div>${item.contributionCount} attempts | ${item.ledgerPublishedCount ?? item.publishedCount ?? 0} ledger published</div>
            <div class="repo-sub">${item.conversionNote || `${item.attemptToPublishedRate ?? 0}% to pub | ${item.attemptToPrRate ?? 0}% to pr | ${item.attemptToMergedRate ?? 0}% to merge`}</div>
            <div class="repo-sub">${item.reopenableAttemptCount ?? 0} reopenable | ${item.highLeverageAttemptCount ?? 0} high leverage | ${item.stalePublishedWithoutPrCount ?? 0} published waiting PR</div>
            <div class="repo-sub">${renderSparkline(signals.trend)}</div>
          </div>
        </td>
        <td data-label="Latest Outcome">
          <div class="project-cell">
            <div>${latestOutcome}</div>
            <div class="repo-sub">${item.prOpenCount ?? 0} PR open | ${item.mergedCount} merged | landed ${item.lastMeaningfulLandingAt || item.lastSuccessfulLandingAt || "n/a"}</div>
            <div class="repo-sub">${item.blockageNote || `${item.reviewRequiredCount ?? 0} review | ${item.validationFailedCount ?? 0} validation fail | ${item.openAttemptCount ?? 0} open`}</div>
          </div>
        </td>
        <td data-label="Score">
          <div class="project-cell">
            <div>${item.score}</div>
            <div class="repo-sub">
              ${renderOpenAction(item.detailLink, projectActionLabel)}
            </div>
          </div>
        </td>
      `;
      table.appendChild(tr);
    });

  function renderAttemptsTable() {
    const rows = filteredAttempts();
    const table = document.getElementById("attempts-table");

    table.innerHTML = "";
    document.getElementById("attempts-badge").textContent = `${rows.length} visible attempts`;
    document.getElementById("attempts-summary").textContent =
      `${rows.length} attempts | ${formatRepoLabel(state.repo)} | ${formatDecisionLabel(state.decision)}`;
    document.getElementById("attempts-detail").textContent =
      `${rows.filter((item) => item.outcome === "merged").length} merged | ${rows.filter((item) => item.isReopenable).length} reopenable | ${rows.filter((item) => (item.staleDays ?? 0) >= 14).length} stale`;

    if (rows.length === 0) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="5">No contribution attempts match the current filter state.</td>`;
      table.appendChild(tr);
      return;
    }

    rows.forEach((item) => {
      const openActionLabel = formatOpenTargetAction(item.openTarget);
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td data-label="Attempt">
          <div class="project-cell">
            <div class="attempt-head">
            <div class="repo-title">${item.title}</div>
              <span class="pill source-pill" data-source="${item.source}">${item.sourceLabel}</span>
            </div>
            <div class="repo-sub">${formatAttemptReference(item)}</div>
            <div class="repo-sub">${formatAttemptWorkSummary(item)}</div>
            <div class="repo-sub">${formatValidationLabel(item.validationState, item.validationSummary)}</div>
            <div class="repo-sub">${item.ageDays ?? 0}d age | ${item.isReopenable ? "reopenable" : "not reopenable"} | ${item.highLeverage ? "high leverage" : "normal leverage"}</div>
          </div>
        </td>
        <td data-label="Outcome">
          <div class="project-cell">
            <span class="pill" data-tone="${item.outcome}">${formatOutcomeLabel(item.outcome)}</span>
            <div class="repo-sub">${item.assetCompletenessLabel || "0/4 assets"}</div>
            <div class="repo-sub">${item.reopenHint || "no follow-up hint"}</div>
          </div>
        </td>
        <td data-label="Ledger Trace">
          <div class="trace-cell">
            ${item.ledgerTrace.map((entry) => `<span class="trace-tag">${entry}</span>`).join("")}
          </div>
        </td>
        <td data-label="Last Update">
          <div class="project-cell">
            <div>${item.lastUpdatedAt}</div>
            <div class="repo-sub">${formatDecisionLabel(item.decision)}</div>
          </div>
        </td>
        <td data-label="Open">
          <div class="project-cell">
            ${renderOpenAction(item.detailLink, openActionLabel)}
          </div>
        </td>
      `;
      table.appendChild(tr);
    });
  }

  function renderTrend() {
    const records = trendRecords();
    const maxValue = Math.max(...records.map((item) => item.drafted + (item.ledgerPublished ?? item.published ?? 0) + (item.prOpen ?? 0) + item.merged), 1);
    const container = document.getElementById("trend-bars");
    const yAxis = document.getElementById("trend-y-axis");
    const summary = document.getElementById("trend-summary");

    document.getElementById("trend-badge").textContent =
      state.period === "weekly" ? `${records.length} weekly buckets` : `${records.length} monthly buckets`;
    document.getElementById("trend-insight").textContent = buildTrendInsight(records);
    summary.innerHTML = buildTrendSummary(records)
      .map(
        (item) => `
          <div class="trend-summary-item">
            <div class="trend-summary-label">${item.label}</div>
            <div class="trend-summary-value">${item.value}</div>
            <div class="trend-summary-note">${item.note}</div>
          </div>
        `,
      )
      .join("");

    container.innerHTML = "";
    yAxis.innerHTML = "";

    [maxValue, Math.round(maxValue * 0.75), Math.round(maxValue * 0.5), Math.round(maxValue * 0.25), 0].forEach(
      (tick) => {
        const label = document.createElement("div");
        label.className = "trend-y-tick";
        label.textContent = String(tick);
        yAxis.appendChild(label);
      },
    );

    records.forEach((item) => {
      const draftedHeight = (item.drafted / maxValue) * 182;
      const publishedHeight = ((item.ledgerPublished ?? item.published ?? 0) / maxValue) * 182;
      const prOpenHeight = ((item.prOpen ?? 0) / maxValue) * 182;
      const mergedHeight = (item.merged / maxValue) * 182;
      const col = document.createElement("div");
      col.className = "trend-col";
      col.innerHTML = `
        <div class="trend-stack">
          <div class="trend-bar" data-kind="drafted" style="height:${Math.max(8, draftedHeight)}px;"></div>
          <div class="trend-bar" data-kind="published" style="height:${Math.max(8, publishedHeight)}px;"></div>
          <div class="trend-bar" data-kind="pr_open" style="height:${Math.max(8, prOpenHeight)}px;"></div>
          <div class="trend-bar" data-kind="merged" style="height:${Math.max(8, mergedHeight)}px;"></div>
        </div>
        <div class="trend-meta">
          <div class="trend-period">${item.period}</div>
          <div class="trend-total">${item.drafted}/${item.ledgerPublished ?? item.published ?? 0}/${item.prOpen ?? 0}/${item.merged}</div>
          <div class="trend-source">P ${item.sourceBreakdown?.proof ?? 0} | M ${item.sourceBreakdown?.memory ?? 0} | A ${item.sourceBreakdown?.artifact ?? 0}</div>
        </div>
      `;
      container.appendChild(col);
    });
  }

  function renderActivityTimeline() {
    const container = document.getElementById("activity-list");
    container.innerHTML = "";

    const items = filteredActivity().slice(0, 5);
    if (items.length === 0) {
      const block = document.createElement("article");
      block.className = "activity-item";
      block.innerHTML = `
        <div class="activity-top">
          <div class="activity-title">No activity yet</div>
        </div>
        <div class="activity-sub">Once OpenMeta records real contribution attempts, the newest moves will appear here.</div>
      `;
      container.appendChild(block);
      return;
    }

    items.forEach((item) => {
      const block = document.createElement("article");
      block.className = "activity-item";
      block.innerHTML = `
        <div class="activity-top">
          <div class="activity-title">${item.title}</div>
          <span class="pill" data-tone="${item.type}">${formatOutcomeLabel(item.type)}</span>
        </div>
        <div class="activity-meta">${item.repoFullName} | ${item.date}</div>
        <div class="activity-sub">${item.description}</div>
      `;
      container.appendChild(block);
    });
  }

  function renderVaultComposition() {
    const total = Math.max(1, Object.values(data.assets).reduce((sum, value) => sum + value, 0));
    const container = document.getElementById("vault-composition");
    container.innerHTML = "";

    Object.entries(data.assets).forEach(([key, value]) => {
      const span = document.createElement("span");
      span.dataset.kind = key;
      span.style.width = `${(value / total) * 100}%`;
      container.appendChild(span);
    });
  }

  function renderArchive() {
    const groups = [
      {
        title: "High Leverage",
        tone: "published",
        items: data.archive.filter((item) => item.status === "ready" || item.status === "compounding"),
      },
      {
        title: "Needs Revisit",
        tone: "watch",
        items: data.archive.filter((item) => item.status === "review" || item.status === "hold"),
      },
    ];

    const container = document.getElementById("archive-grid");
    container.innerHTML = "";

    groups.forEach((group) => {
      const section = document.createElement("section");
      section.className = "archive-column";
      section.innerHTML = `
        <div class="archive-column-head">
          <h3>${group.title}</h3>
          <span class="pill" data-tone="${group.tone}">${group.items.length}</span>
        </div>
        ${
          group.items.length > 0
            ? group.items
                .map(
                  (item) => `
                    <article class="archive-item">
                      <div class="archive-top">
                        <div class="archive-cell">
                          <div class="archive-title">${item.label}</div>
                          <div class="archive-sub">${item.repoFullName} | ${item.title}</div>
                        </div>
                        <span class="pill" data-tone="${archiveToneMap[item.status]}">${item.status}</span>
                      </div>
                      <div class="archive-evidence">${item.evidenceLevel} | ${item.assetCompletenessLabel || "0/4 assets"} | ${item.reuseLabel}</div>
                      <div class="archive-lines">
                        <div class="archive-line archive-line-strong">${item.followThroughLabel} | revisit ${item.lastRevisitedAt}</div>
                        ${item.lines.map((line) => `<div class="archive-line">${line}</div>`).join("")}
                      </div>
                    </article>
                  `,
                )
                .join("")
            : `<article class="archive-item"><div class="archive-line">No archive entries in this group yet.</div></article>`
        }
      `;
      container.appendChild(section);
    });
  }

  function renderDashboard() {
    renderTopMeta();
    renderOverview();
    renderOverviewFunnel();
    renderDecisionCallout();
    renderDecisionList();
    renderProjectsTable();
    renderAttemptsTable();
    renderTrend();
    renderActivityTimeline();
    renderVaultComposition();
    renderArchive();
  }

  async function loadDashboardData(options) {
    const requestPath = options?.forceRefresh ? "./api/dashboard/refresh" : "./api/dashboard";
    const response = await fetch(requestPath, {
      method: options?.forceRefresh ? "POST" : "GET",
      cache: "no-store",
    });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    data = await response.json();
    return data;
  }

  async function bootstrap() {
    await loadDashboardData();
    initFilters();
    renderDashboard();
  }

  bootstrap().catch((error) => {
    document.getElementById("sync-status").textContent =
      `Dashboard failed to initialize | ${error instanceof Error ? error.message : String(error)}`;
  });
})();
  </script>
